<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NestMind AI — Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
        rel="stylesheet" />
    <style>
        :root {
            --bg: #000000;
            --surface: #111111;
            --surface-2: #1a1a1a;
            --border: #222222;
            --border-light: #333333;
            --text: #ffffff;
            --text-secondary: #999999;
            --text-muted: #666666;
            --accent: #00c896;
            --accent-glow: rgba(0, 200, 150, 0.15);
            --accent-2: #7c5cff;
            --gradient: linear-gradient(135deg, #00c896, #7c5cff);
            --error-bg: rgba(239, 68, 68, 0.1);
            --error-border: rgba(239, 68, 68, 0.3);
            --error-text: #f87171;
            --success-bg: rgba(34, 197, 94, 0.1);
            --success-border: rgba(34, 197, 94, 0.3);
            --success-text: #4ade80;
            --radius: 16px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        body::before {
            content: '';
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, var(--accent-glow) 0%, transparent 70%);
            top: -200px;
            right: -100px;
            pointer-events: none;
        }

        body::after {
            content: '';
            position: absolute;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(124, 92, 255, 0.08) 0%, transparent 70%);
            bottom: -100px;
            left: -100px;
            pointer-events: none;
        }

        .auth-container {
            width: 100%;
            max-width: 440px;
            padding: 24px;
            position: relative;
            z-index: 1;
        }

        .logo {
            text-align: center;
            margin-bottom: 36px;
        }

        .logo a {
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

        .logo-icon {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            background: var(--gradient);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .logo-text {
            font-weight: 800;
            font-size: 22px;
            color: #fff;
        }

        .logo p {
            color: var(--text-muted);
            font-size: 14px;
            margin-top: 8px;
        }

        .card {
            background: var(--surface);
            border-radius: var(--radius);
            padding: 36px;
            border: 1px solid var(--border);
        }

        .tabs {
            display: flex;
            margin-bottom: 28px;
            border-radius: 12px;
            background: var(--bg);
            padding: 4px;
            border: 1px solid var(--border);
        }

        .tab {
            flex: 1;
            text-align: center;
            padding: 11px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            color: var(--text-muted);
            transition: all 0.2s;
        }

        .tab.active {
            background: var(--surface-2);
            color: #fff;
        }

        .tab:hover:not(.active) {
            color: var(--text-secondary);
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-secondary);
            margin-bottom: 7px;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 12px 14px;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: var(--bg);
            color: var(--text);
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
            font-family: inherit;
        }

        .form-group input:focus,
        .form-group select:focus {
            border-color: var(--accent);
        }

        .form-group input::placeholder {
            color: var(--text-muted);
        }

        .form-group select {
            cursor: pointer;
        }

        .form-group select option {
            background: var(--surface);
            color: var(--text);
        }

        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 100px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
        }

        .btn-primary {
            background: #fff;
            color: #000;
        }

        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 30px rgba(255, 255, 255, 0.12);
        }

        .btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none !important;
        }

        .error-msg {
            background: var(--error-bg);
            border: 1px solid var(--error-border);
            color: var(--error-text);
            padding: 12px 14px;
            border-radius: 10px;
            font-size: 13px;
            margin-bottom: 18px;
            display: none;
        }

        .success-msg {
            background: var(--success-bg);
            border: 1px solid var(--success-border);
            color: var(--success-text);
            padding: 12px 14px;
            border-radius: 10px;
            font-size: 13px;
            margin-bottom: 18px;
            display: none;
        }

        .signup-fields {
            display: none;
        }

        .divider {
            text-align: center;
            color: var(--text-muted);
            font-size: 12px;
            margin: 20px 0 0;
            letter-spacing: 0.3px;
        }

        .back-link {
            text-align: center;
            margin-top: 20px;
        }

        .back-link a {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 13px;
            transition: color 0.2s;
        }

        .back-link a:hover {
            color: #fff;
        }

        @media (max-width: 480px) {
            .auth-container {
                padding: 16px;
            }

            .card {
                padding: 24px;
            }
        }
    </style>
</head>

<body>
    <div class="auth-container">
        <div class="logo">
            <a href="/">
                <div class="logo-icon">🏠</div>
                <span class="logo-text">NestMind AI</span>
            </a>
            <p>AI-Powered Property Management</p>
        </div>
        <div class="card">
            <div class="tabs">
                <div class="tab active" onclick="switchTab('login')">Login</div>
                <div class="tab" onclick="switchTab('signup')">Sign Up</div>
            </div>
            <div id="error" class="error-msg"></div>
            <div id="success" class="success-msg"></div>
            <form id="authForm" onsubmit="handleSubmit(event)">
                <div class="signup-fields" id="signupFields">
                    <div class="form-group">
                        <label>Full Name</label>
                        <input type="text" id="name" placeholder="Jane Smith" />
                    </div>
                    <div class="form-group">
                        <label>Company (optional)</label>
                        <input type="text" id="company" placeholder="Smith Properties" />
                    </div>
                    <div class="form-group">
                        <label>WhatsApp Number</label>
                        <input type="tel" id="phone" placeholder="+14165551234" />
                    </div>
                    <div class="form-group">
                        <label>Province / State</label>
                        <select id="province">
                            <option value="ON">Ontario</option>
                            <option value="BC">British Columbia</option>
                            <option value="AB">Alberta</option>
                            <option value="SK">Saskatchewan</option>
                            <option value="MB">Manitoba</option>
                            <option value="QC">Quebec</option>
                            <option value="NS">Nova Scotia</option>
                            <option value="NB">New Brunswick</option>
                            <option value="NY">New York</option>
                            <option value="CA_US">California</option>
                            <option value="TX">Texas</option>
                            <option value="UK">United Kingdom</option>
                        </select>
                    </div>
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="email" placeholder="jane@example.com" required />
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" placeholder="Min 8 characters" required minlength="8" />
                </div>
                <button type="submit" class="btn btn-primary" id="submitBtn">Login</button>
            </form>
            <div class="divider">Free for up to 3 units · No credit card required</div>
        </div>
        <div class="back-link">
            <a href="/">← Back to home</a>
        </div>
    </div>

    <script>
        let mode = 'login';

        // Redirect if already logged in
        if (localStorage.getItem('token')) {
            window.location.href = '/dashboard';
        }

        function switchTab(tab) {
            mode = tab;
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelector(`.tab:${tab === 'login' ? 'first-child' : 'last-child'}`).classList.add('active');
            document.getElementById('signupFields').style.display = tab === 'signup' ? 'block' : 'none';
            document.getElementById('submitBtn').textContent = tab === 'login' ? 'Login' : 'Create Account';
            document.getElementById('error').style.display = 'none';
            document.getElementById('success').style.display = 'none';
        }

        // Check URL for signup mode
        if (window.location.pathname === '/signup' || window.location.hash === '#signup') {
            switchTab('signup');
        }

        async function handleSubmit(e) {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const errorEl = document.getElementById('error');
            const successEl = document.getElementById('success');
            btn.disabled = true;
            errorEl.style.display = 'none';
            successEl.style.display = 'none';

            const body = {
                email: document.getElementById('email').value,
                password: document.getElementById('password').value,
            };

            if (mode === 'signup') {
                body.name = document.getElementById('name').value;
                body.company = document.getElementById('company').value;
                body.phone = document.getElementById('phone').value;
                body.province = document.getElementById('province').value;
            }

            try {
                const res = await fetch(`/auth/${mode}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body),
                });
                const data = await res.json();

                if (!res.ok) {
                    errorEl.textContent = data.message || data.error || 'Something went wrong';
                    errorEl.style.display = 'block';
                    btn.disabled = false;
                    return;
                }

                localStorage.setItem('token', data.token);
                localStorage.setItem('landlord', JSON.stringify(data.landlord));

                if (mode === 'signup') {
                    window.location.href = '/onboarding';
                } else {
                    window.location.href = '/dashboard';
                }
            } catch (err) {
                errorEl.textContent = 'Network error. Please try again.';
                errorEl.style.display = 'block';
                btn.disabled = false;
            }
        }
    </script>
</body>

</html>
